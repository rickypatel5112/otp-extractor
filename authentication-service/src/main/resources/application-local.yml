server:
  port: 8080

spring:
  application:
    name: otp-authentication-service

  datasource:
    url: jdbc:postgresql://localhost:5432/auth-db
    username: guest
    password: guest
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    #    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database: postgresql
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

front-end:
  urls:
    - http://localhost:3000
    - http://my-frontend.com
    - http://another-frontend.com

reset-password:
  queue: reset-password-queue

jwt:
  secret-key: ZjRibnJsTVZxeEdlTTlrR2JkVVVYWTJYcVdDd2JwZldrRTFURkg2VG1VOA==
