name: CI

on:
  push:
    branches: master

  pull_request:
    branches: master
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Check formatting
        run: mvn spotless:check

      - name: Build project
        run: mvn clean verify
  
